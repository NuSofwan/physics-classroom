# Deploy to Render.com — push this repo to GitHub, then on Render choose
# "New > Blueprint" and point it at the repo. Render reads this file.
services:
  - type: web
    name: physics-classroom
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      # Admin password. Same as the app's built-in default — change this value
      # (or set it in the Render dashboard) to use your own.
      - key: ADMIN_PASSWORD
        value: physics2026
      - key: NODE_VERSION
        value: 20
    # NOTE: the free plan has an ephemeral filesystem — classrooms/videos added
    # at runtime reset on each redeploy/cold start. To keep data permanently,
    # upgrade this service to a paid plan and uncomment the disk below
    # (persistent disks are not available on the free plan):
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
