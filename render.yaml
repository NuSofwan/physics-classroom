# Deploy to Render.com — push this repo to GitHub, then on Render choose
# "New > Blueprint" and point it at the repo. Render reads this file.
services:
  - type: web
    name: physics-classroom
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      # Admin password. Same as the app's built-in default — change this value
      # (or set it in the Render dashboard) to use your own.
      - key: ADMIN_PASSWORD
        value: physics2026
      - key: NODE_VERSION
        value: 20
    # Free instances have an ephemeral filesystem (data resets on redeploy).
    # Attach a persistent disk so classrooms/videos survive restarts:
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
